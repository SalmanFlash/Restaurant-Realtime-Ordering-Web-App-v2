<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Display</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body class="kitchen-mode p-3">

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
        <h2 class="text-warning">👨‍🍳 Kitchen View: <span id="rest-title" class="text-white">...</span></h2>
        <div id="connection-status" class="badge bg-success">Live Connected</div>
    </div>

    <div class="row" id="orders-container">
        <div class="col-12 text-center mt-5 text-muted">
            <h4>Waiting for orders...</h4>
        </div>
    </div>
</div>

<script src="js/firebase-config.js"></script>
<script src="js/kitchen.js"></script>
</body>
</html>
